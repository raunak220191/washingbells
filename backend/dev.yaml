# WashingBells — development configuration
# Non-secret service config lives here. Fill in real values for local/dev runs.
#
# Twilio Verify — SMS & OTP provider (server-side only; never shipped to apps).
# Leave the verify credentials empty to use the dev bypass (OTP is always
# 123456 and invitation SMS is logged to the console instead of being sent).
# NOTE: these are SECRETS — do not commit real values. Put real creds in .env
# (TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN / TWILIO_VERIFY_SERVICE_SID) instead.
twilio:
  account_sid: ""                  # ACxxxxxxxx
  auth_token: ""                   # Twilio auth token
  verify_service_sid: ""           # VAxxxxxxxx (Verify service)
  default_country_code: "91"       # prepended to bare 10-digit numbers

  # Invitation SMS (rider/store) uses Twilio Messaging — set one of these:
  messaging_service_sid: ""        # MGxxxxxxxx (preferred)
  from_number: ""                  # +1xxxxxxxxxx fallback sender

# Razorpay — payments. Leave key_id/key_secret empty to use the dev bypass
# (payment is auto-marked successful). With keys set, real Razorpay orders are
# created and payment signatures are verified server-side.
razorpay:
  key_id: "rzp_test_Sx7C0PtPIbh7QI"      # TEST key
  key_secret: "Y5JeExv5ig0pXwv7onRWH0ml"  # TEST secret
