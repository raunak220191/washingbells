# ============================================================
# WashingBells — Master Rate List
# ============================================================
# Admin: Edit prices here. Backend reads this on service seed.
# After editing, delete the "services" collection in MongoDB
# and restart the backend to re-seed with new prices.
#
# category: one of  men | women | kids | unisex | home | footwear | accessories | other
#   unisex = generic apparel, shown under every gender tab (default).
#   home   = household linens & furnishings (curtains, bedsheets, sofa…).
# ============================================================

